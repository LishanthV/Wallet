{% extends "base.html" %}
{% block title %}Add Income — Trackify{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h2>Add Income</h2>
    <p class="page-sub">Record a new revenue stream</p>
  </div>
  <a href="{{ url_for('income_list') }}" class="btn-secondary">← Back</a>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
  <form method="POST" action="{{ url_for('add_income') }}">
    <div class="form-group" style="margin-bottom: 20px;">
      <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px;">Income Title</label>
      <input type="text" name="title" placeholder="e.g. Monthly Salary" required maxlength="150"
             style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-app);">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
      <div class="form-group">
        <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px;">Amount ({{ currency_symbol }})</label>
        <input type="number" name="amount" placeholder="0.00" step="0.01" min="0.01" required
               style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-app); font-weight: 700;">
      </div>
      <div class="form-group">
        <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px;">Date</label>
        <input type="date" name="income_date" value="{{ today }}" max="{{ today }}" required
               style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-app);">
      </div>
    </div>

    <div class="form-group" style="margin-bottom: 20px;">
      <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px;">Category</label>
      <select name="category" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-app);">
        {% for c in categories %}
        <option>{{ c }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group" style="margin-bottom: 24px;">
      <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px;">Notes (Optional)</label>
      <textarea name="note" rows="3" placeholder="Additional details..."
                style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-app); resize: none;"></textarea>
    </div>

    <div class="form-group" style="margin-bottom: 32px; background: var(--success-light); padding: 16px; border-radius: 12px; border: 1px dashed var(--success);">
      <label style="display: flex; align-items: center; gap: 12px; cursor: pointer; color: var(--success); font-weight: 600;">
        <input type="checkbox" name="add_to_wallet" value="1" style="width: 20px; height: 20px;">
        <span>Automatically add this to my wallet balance</span>
      </label>
    </div>

    <div style="display: flex; gap: 12px;">
      <button type="submit" class="btn-primary" style="flex: 2; padding: 14px;">Save Income Entry</button>
      <a href="{{ url_for('income_list') }}" class="btn-secondary" style="flex: 1; text-align: center; padding: 14px;">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
