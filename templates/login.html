{% extends "base.html" %}
{% block title %}Sign In — Trackify{% endblock %}

{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class="card" style="width: 100%; max-width: 440px; padding: 40px; text-align: center;">
        <div style="margin-bottom: 32px;">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Trackify Logo" style="height: 64px; width: auto; margin-bottom: 24px;">
            <h2 style="font-size: 28px; margin-bottom: 8px;">Welcome back</h2>
            <p style="color: var(--text-muted); font-size: 15px;">Sign in to your Trackify account</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST" class="modern-form" style="text-align: left;">
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px;">Email address</label>
                <input type="email" name="email" placeholder="name@company.com" required 
                       style="width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border); font-size: 15px; outline: none; transition: var(--transition);">
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label style="font-size: 13px; font-weight: 700; color: var(--text-muted);">Password</label>
                    <a href="#" style="font-size: 12px; color: var(--primary); font-weight: 600; text-decoration: none;">Forgot password?</a>
                </div>
                <div style="position: relative;">
                    <input type="password" id="loginPass" name="password" placeholder="••••••••" required 
                           style="width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border); font-size: 15px; outline: none; transition: var(--transition);">
                    <button type="button" onclick="togglePass('loginPass')" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-light); cursor: pointer;">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 16px; font-size: 16px;">
                Sign in
            </button>
        </form>

        <p style="margin-top: 32px; font-size: 14px; color: var(--text-muted);">
            Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary); font-weight: 700; text-decoration: none;">Create one for free</a>
        </p>
    </div>
</div>

<script>
function togglePass(id) {
    const input = document.getElementById(id);
    const icon = event.currentTarget.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
{% endblock %}
