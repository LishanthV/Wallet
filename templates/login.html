{% extends "base.html" %}
{% block title %}Sign In — FinanceApp{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-header">
    <div class="auth-logo">&#10022;</div>
    <h1>Welcome back</h1>
    <p>Sign in to your FinanceApp account</p>
  </div>

  <form method="POST" action="{{ url_for('login') }}" class="auth-form" id="login-form">
    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email"
             placeholder="you@example.com"
             required autocomplete="email" autofocus/>
    </div>

    <div class="form-group">
      <label for="password">
        Password
        <a href="{{ url_for('forgot_password') }}" class="label-link">Forgot password?</a>
      </label>
      <div class="input-password">
        <input type="password" id="password" name="password"
               placeholder="••••••••" required autocomplete="current-password"/>
        <button type="button" class="eye-btn"
                onclick="togglePw('password', this)" aria-label="Toggle password visibility">
          &#128065;
        </button>
      </div>
    </div>

    <button type="submit" class="btn-primary btn-full" id="login-btn">Sign in</button>
  </form>

  {% if unverified %}
  <div class="resend-box">
    <p>Haven't received your verification email?</p>
    <form method="POST" action="{{ url_for('resend_verification') }}">
      <input type="hidden" name="email" value="{{ unverified_email }}"/>
      <button type="submit" class="btn-secondary btn-full">Resend verification email</button>
    </form>
  </div>
  {% endif %}

  <p class="auth-switch">
    Don't have an account? <a href="{{ url_for('register') }}">Create one for free</a>
  </p>
</div>
{% endblock %}
