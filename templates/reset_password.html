{% extends "base.html" %}
{% block title %}Reset Password — FinanceApp{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-header">
    <div class="auth-logo" style="font-size: 36px;">&#128273;</div>
    <h1>Reset password</h1>
    <p>Enter a new password for your account</p>
  </div>

  <form method="POST" action="{{ url_for('reset_password', token=token) }}" class="auth-form">
    <!-- New password -->
    <div class="form-group">
      <label for="password">New password</label>
      <div class="input-password">
        <input type="password" id="password" name="password"
               placeholder="Min 8 characters"
               required minlength="8"
               oninput="checkStrength(this.value)" autofocus/>
        <button type="button" class="eye-btn"
                onclick="togglePw('password', this)" aria-label="Toggle">
          &#128065;
        </button>
      </div>
      <div class="strength-bar">
        <div id="strengthFill" class="strength-fill"></div>
      </div>
      <span id="strengthLabel" class="strength-label"></span>
    </div>

    <!-- Confirm password -->
    <div class="form-group">
      <label for="confirm_password">Confirm new password</label>
      <div class="input-password">
        <input type="password" id="confirm_password" name="confirm_password"
               placeholder="••••••••" required/>
        <button type="button" class="eye-btn"
                onclick="togglePw('confirm_password', this)" aria-label="Toggle">
          &#128065;
        </button>
      </div>
    </div>

    <button type="submit" class="btn-primary btn-full">&#128273; Reset password</button>
  </form>
</div>
{% endblock %}
