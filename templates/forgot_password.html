{% extends "base.html" %}
{% block title %}Forgot Password — FinanceApp{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-header">
    <div class="auth-logo" style="font-size: 36px;">&#128274;</div>
    <h1>Forgot password?</h1>
    <p>Enter your email — we'll send a reset link valid for 1 hour</p>
  </div>

  <form method="POST" action="{{ url_for('forgot_password') }}" class="auth-form">
    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email"
             placeholder="you@example.com"
             required autocomplete="email" autofocus/>
    </div>
    <button type="submit" class="btn-primary btn-full">Send reset link</button>
  </form>

  <p class="auth-switch">
    <a href="{{ url_for('login') }}">&#8592; Back to sign in</a>
  </p>
</div>
{% endblock %}
