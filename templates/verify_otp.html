{% extends "base.html" %}
{% block title %}Verify Your Email — Trackify{% endblock %}

{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class="card" style="width: 100%; max-width: 440px; padding: 40px; text-align: center;">
        <div style="margin-bottom: 32px;">
            <div style="width: 72px; height: 72px; background: var(--primary-light); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 24px;">
                <i class="fa-solid fa-envelope-shield"></i>
            </div>
            <h2 style="font-size: 28px; margin-bottom: 8px;">Check your email</h2>
            <p style="color: var(--text-muted); font-size: 15px;">We've sent a 6-digit code to <br><strong>{{ email }}</strong></p>
        </div>

        <form action="{{ url_for('verify_otp') }}" method="POST" class="modern-form">
            <div style="display: flex; gap: 12px; justify-content: center; margin-bottom: 32px;" id="otp-container">
                <input type="text" name="otp_1" class="otp-input" maxlength="1" required autofocus>
                <input type="text" name="otp_2" class="otp-input" maxlength="1" required>
                <input type="text" name="otp_3" class="otp-input" maxlength="1" required>
                <input type="text" name="otp_4" class="otp-input" maxlength="1" required>
                <input type="text" name="otp_5" class="otp-input" maxlength="1" required>
                <input type="text" name="otp_6" class="otp-input" maxlength="1" required>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 16px; font-size: 16px;">
                Verify & Create Account
            </button>
        </form>

        <p style="margin-top: 32px; font-size: 14px; color: var(--text-muted);">
            Didn't receive the code? <a href="{{ url_for('resend_otp') }}" style="color: var(--primary); font-weight: 700; text-decoration: none;">Resend OTP</a>
        </p>
    </div>
</div>

<style>
.otp-input {
    width: 48px;
    height: 56px;
    text-align: center;
    font-size: 24px;
    font-weight: 800;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: white;
    transition: var(--transition);
    outline: none;
    color: var(--secondary);
}
.otp-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(39, 174, 96, 0.1);
}
</style>

<script>
document.querySelectorAll('.otp-input').forEach((input, index, inputs) => {
    input.addEventListener('input', (e) => {
        if (e.target.value.length === 1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
    });

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
            inputs[index - 1].focus();
        }
    });
});
</script>
{% endblock %}
