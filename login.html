{% extends "base.html" %}
{% block title %}Login — Finance Dashboard{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-header">
    <div class="auth-logo">&#9670;</div>
    <h1>Welcome back</h1>
    <p>Sign in to your account</p>
  </div>

  <form method="POST" action="{{ url_for('login') }}" class="auth-form">
    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
    </div>

    <div class="form-group">
      <label for="password">
        Password
        <a href="{{ url_for('forgot_password') }}" class="label-link">Forgot password?</a>
      </label>
      <div class="input-password">
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password"/>
        <button type="button" class="eye-btn" onclick="togglePw('password', this)">&#128065;</button>
      </div>
    </div>

    <button type="submit" class="btn-primary btn-full">Sign in</button>
  </form>

  {% if unverified %}
  <div class="resend-box">
    <p>Haven't received the verification email?</p>
    <form method="POST" action="{{ url_for('resend_verification') }}">
      <input type="hidden" name="email" value="{{ unverified_email }}"/>
      <button type="submit" class="btn-secondary btn-full">Resend verification email</button>
    </form>
  </div>
  {% endif %}

  <p class="auth-switch">
    Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
  </p>
</div>
{% endblock %}
