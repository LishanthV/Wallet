{% extends "base.html" %}
{% block title %}Register — Finance Dashboard{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-header">
    <div class="auth-logo">&#9670;</div>
    <h1>Create account</h1>
    <p>Start tracking your expenses today</p>
  </div>

  <form method="POST" action="{{ url_for('register') }}" class="auth-form">
    <div class="form-group">
      <label for="name">Full name</label>
      <input type="text" id="name" name="name" placeholder="Muminul Hoque" required autocomplete="name" minlength="2"/>
    </div>

    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-password">
        <input type="password" id="password" name="password" placeholder="Min 8 characters"
               required minlength="8" autocomplete="new-password" oninput="checkStrength(this.value)"/>
        <button type="button" class="eye-btn" onclick="togglePw('password', this)">&#128065;</button>
      </div>
      <div class="strength-bar"><div id="strengthFill" class="strength-fill"></div></div>
      <span id="strengthLabel" class="strength-label"></span>
    </div>

    <div class="form-group">
      <label for="confirm_password">Confirm password</label>
      <div class="input-password">
        <input type="password" id="confirm_password" name="confirm_password"
               placeholder="••••••••" required autocomplete="new-password"/>
        <button type="button" class="eye-btn" onclick="togglePw('confirm_password', this)">&#128065;</button>
      </div>
    </div>

    <button type="submit" class="btn-primary btn-full">Create account</button>
  </form>

  <p class="auth-switch">
    Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
  </p>
</div>
{% endblock %}
