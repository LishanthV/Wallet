{% extends "base.html" %}
{% block title %}Add Income — Finance App{% endblock %}
{% block content %}
<div class="page-header">
  <div><h2>Add Income</h2><p class="page-sub">Record a new income entry</p></div>
  <a href="{{ url_for('income_list') }}" class="btn-secondary">← Back</a>
</div>
<div class="form-card">
  <form method="POST" action="{{ url_for('add_income') }}">
    <div class="form-row">
      <div class="form-group"><label>Title</label><input type="text" name="title" placeholder="e.g. Monthly Salary" required maxlength="150"/></div>
      <div class="form-group"><label>Amount ($)</label><input type="number" name="amount" placeholder="0.00" step="0.01" min="0.01" required/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Category</label>
        <select name="category" required>{% for c in categories %}<option>{{ c }}</option>{% endfor %}</select>
      </div>
      <div class="form-group"><label>Date</label><input type="date" name="income_date" value="{{ today }}" max="{{ today }}" required/></div>
    </div>
    <div class="form-group"><label>Note <span class="label-optional">(optional)</span></label><textarea name="note" rows="2" placeholder="Any details..."></textarea></div>
    <div class="form-group">
      <label style="flex-direction:row;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" name="add_to_wallet" value="1" style="width:auto"/>
        Add this income to my wallet balance
      </label>
    </div>
    <div class="form-actions">
      <a href="{{ url_for('income_list') }}" class="btn-secondary">Cancel</a>
      <button type="submit" class="btn-primary">Save Income</button>
    </div>
  </form>
</div>
{% endblock %}
