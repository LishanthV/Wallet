{% extends "base.html" %}
{% block title %}Forgot Password — Finance Dashboard{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-header">
    <div class="auth-logo">&#128274;</div>
    <h1>Forgot password?</h1>
    <p>Enter your email and we'll send a reset link</p>
  </div>

  <form method="POST" action="{{ url_for('forgot_password') }}" class="auth-form">
    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
    </div>
    <button type="submit" class="btn-primary btn-full">Send reset link</button>
  </form>

  <p class="auth-switch">
    <a href="{{ url_for('login') }}">&#8592; Back to sign in</a>
  </p>
</div>
{% endblock %}
